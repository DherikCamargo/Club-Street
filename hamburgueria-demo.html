<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Brasa Burger - Cardápio Interativo</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,Helvetica,sans-serif;background:#080808;color:#fff;line-height:1.4}.top{position:sticky;top:0;z-index:20;background:rgba(8,8,8,.96);backdrop-filter:blur(10px);border-bottom:1px solid #241800}.head{display:flex;align-items:center;justify-content:center;padding:16px 120px 14px;position:relative}.logo{text-align:center}.logo h1{font-size:32px;letter-spacing:1px}.logo span{color:#ffb000;font-weight:800;font-size:14px}.cartbtn{position:absolute;right:16px;top:50%;transform:translateY(-50%);border:1.5px solid #ffb000;border-radius:999px;background:#111;color:#fff;padding:12px 16px;font-weight:800;cursor:pointer}.badge{position:absolute;top:-9px;right:-7px;background:#d71919;width:24px;height:24px;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:12px}.badge.on{display:flex}.tabs{display:flex;gap:10px;overflow:auto;padding:12px 16px;background:#101010;border-bottom:1px solid #241800}.tab{border:1px solid #333;background:#151515;color:#fff;border-radius:13px;padding:13px 18px;font-weight:800;white-space:nowrap;cursor:pointer}.tab.active{background:#ffb000;color:#111;border-color:#ffb000}.wrap{max-width:1180px;margin:auto;padding:18px}.intro{padding:18px 4px 20px}.intro h2{font-size:30px;margin-bottom:6px}.intro p{color:#d6d6d6}.intro strong{color:#ffb000}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.card{background:#121212;border:1px solid #2b2b2b;border-radius:18px;overflow:hidden}.pic{height:215px;background:#181818}.pic img{width:100%;height:100%;object-fit:cover}.info{padding:16px}.tag{display:inline-block;background:#be1e1e;color:#fff;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:800;margin-bottom:8px}.info h3{font-size:22px;margin-bottom:7px}.desc{color:#cfcfcf;font-size:14px;min-height:58px;line-height:1.35}.price-row{display:flex;align-items:center;justify-content:space-between;margin-top:16px}.price{color:#ffb000;font-size:23px;font-weight:900}.add{border:1.5px solid #ffb000;background:transparent;color:#ffb000;border-radius:12px;padding:11px 15px;font-weight:900;cursor:pointer}.benefits{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:22px 0}.benefit{border:1px solid #332300;border-radius:16px;padding:16px;text-align:center;color:#ddd}.benefit b{color:#ffb000;display:block;margin-bottom:5px}.overlay{display:none;position:fixed;inset:0;background:#000b;z-index:40;align-items:center;justify-content:center;padding:16px}.overlay.on{display:flex}.modal{width:min(500px,96vw);max-height:92vh;overflow:auto;background:#121212;border:1px solid #333;border-radius:22px;position:relative}.x{position:absolute;top:10px;right:12px;background:none;border:0;color:#fff;font-size:28px;cursor:pointer}.modal img{width:100%;height:260px;object-fit:cover;border-radius:22px 22px 0 0}.modal-body{padding:18px}.modal-body h2{font-size:27px}.line{height:1px;background:#333;margin:16px 0}.opt-title{font-weight:900;margin-bottom:10px}.pillbox{display:grid;grid-template-columns:1fr 1fr;gap:9px}.pill,.check{border:1px solid #444;background:#171717;color:#fff;border-radius:11px;padding:12px;cursor:pointer;text-align:left}.pill.active,.check.active{border-color:#ffb000;background:#2b1b00}.check{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.yellow{color:#ffb000}.modal-add{width:100%;margin-top:16px;background:#ffb000;color:#111;border:0;border-radius:13px;padding:15px;font-size:16px;font-weight:900;cursor:pointer}.drawer{position:fixed;right:0;top:0;bottom:0;width:min(430px,100vw);background:#111;z-index:80;transform:translateX(105%);transition:.25s;border-left:1px solid #333;display:flex;flex-direction:column;box-shadow:-15px 0 35px #0009}.drawer.on{transform:translateX(0)}.drawer h2{padding:18px;border-bottom:1px solid #292929}.closecart{position:absolute;right:16px;top:13px;background:0;border:0;color:#fff;font-size:28px;cursor:pointer}.cartbody{padding:14px;overflow:auto;flex:1}.empty{color:#bbb;text-align:center;margin-top:35px}.cartitem{display:flex;gap:12px;padding:12px;border:1px solid #282828;border-radius:14px;margin-bottom:10px}.cartitem img{width:74px;height:74px;border-radius:10px;object-fit:cover}.cartitem b{display:block}.cartitem small{color:#bbb;display:block;margin-top:4px}.qty{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap}.qty button{background:#222;border:1px solid #444;color:#fff;width:auto;min-width:28px;height:28px;border-radius:7px;cursor:pointer;padding:0 8px}.cartfoot{border-top:1px solid #292929;padding:16px;display:none}.cartfoot.on{display:block}.total{display:flex;justify-content:space-between;font-size:19px;font-weight:900;margin-bottom:12px}.secondary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}.secondary button{padding:12px;border-radius:11px;cursor:pointer;font-weight:800}.clear{background:transparent;color:#ddd;border:1px solid #555}.continue{background:#fff;color:#111;border:1px solid #fff}.finish{width:100%;padding:15px;border-radius:12px;border:0;background:#ffb000;color:#111;font-weight:900;font-size:16px;cursor:pointer}.toast{position:fixed;bottom:24px;left:50%;transform:translate(-50%,80px);background:#ffb000;color:#111;border-radius:12px;padding:13px 20px;font-weight:900;transition:.25s;z-index:100}.toast.on{transform:translate(-50%,0)}@media(max-width:800px){.head{padding:16px 70px}.grid{grid-template-columns:1fr 1fr}.benefits{grid-template-columns:1fr 1fr}.logo h1{font-size:23px}.cartbtn{font-size:0;padding:12px}.cartbtn:before{content:'🛒';font-size:20px}}@media(max-width:520px){.grid{grid-template-columns:1fr}.pic{height:235px}.wrap{padding:12px}.tabs{padding:10px}.tab{padding:11px 14px}.benefits{grid-template-columns:1fr}.intro h2{font-size:25px}}</style></head><body><div class="top"><div class="head"><div class="logo"><h1>🔥 BRASA BURGER</h1><span>★ Cardápio Interativo ★</span></div><button class="cartbtn" onclick="openCart()">🛒 Ver carrinho <span id="badge" class="badge">0</span></button></div><div class="tabs" id="tabs"></div></div><main class="wrap"><section class="intro"><h2>Escolha seu pedido</h2><p>Monte seu lanche, adicione acompanhamentos e envie tudo pronto pelo <strong>WhatsApp</strong>.</p></section><div class="grid" id="grid"></div><section class="benefits"><div class="benefit"><b>🔥 Carne fresca</b>todos os dias</div><div class="benefit"><b>🍔 Pães artesanais</b>briochados</div><div class="benefit"><b>🏆 Ingredientes</b>selecionados</div><div class="benefit"><b>🛵 Entrega</b>rápida e segura</div></section></main><div id="modalOverlay" class="overlay" onclick="outsideModal(event)"><div class="modal"><button class="x" onclick="closeModal()">×</button><img id="mimg" alt="Produto"><div class="modal-body"><span id="mtag" class="tag"></span><h2 id="mtitle"></h2><p id="mdesc" class="desc"></p><div class="price" id="mprice"></div><div id="optionArea"></div><button class="modal-add" onclick="addToCart()">🛒 Adicionar ao pedido</button></div></div></div><div id="cartDrawer" class="drawer"><button class="closecart" onclick="closeCart()">×</button><h2>Meu pedido</h2><div class="cartbody" id="cartBody"></div><div class="cartfoot" id="cartFoot"><div class="total"><span>Total</span><span id="total">R$ 0,00</span></div><div class="secondary"><button class="clear" onclick="clearCart()">Esvaziar</button><button class="continue" onclick="continueBuy()">Continuar comprando</button></div><button class="finish" onclick="finishOrder()">Fazer pedido no WhatsApp</button></div></div><div id="toast" class="toast">Adicionado!</div><script>var WPP='5516994451494';var cats=['Burgers','Combos','Porções','Bebidas'];var currentCat='Burgers',current=null,point='Ao ponto',cartItems=[],selectedAdds={},selectedRemoves={},selectedOption='';function icon(kind,label){var body='';if(kind==='can'){body='<rect x="205" y="70" width="190" height="370" rx="34" fill="#d71919"/><rect x="225" y="105" width="150" height="50" rx="20" fill="#fff" opacity=".9"/><text x="300" y="300" text-anchor="middle" font-size="78">🥤</text>'}if(kind==='water'){body='<path d="M270 62h60v70c0 18 38 47 38 98v190c0 34-25 58-68 58s-68-24-68-58V230c0-51 38-80 38-98z" fill="#d9f5ff" stroke="#6fd6ff" stroke-width="10"/><rect x="252" y="246" width="96" height="92" rx="20" fill="#49bce8" opacity=".85"/><text x="300" y="303" text-anchor="middle" font-size="54">💧</text>'}if(kind==='beer'){body='<path d="M275 52h50v95c0 28 48 63 48 122v174c0 25-20 45-73 45s-73-20-73-45V269c0-59 48-94 48-122z" fill="#2b190b" stroke="#ffb000" stroke-width="9"/><rect x="245" y="270" width="110" height="98" rx="18" fill="#ffb000"/><text x="300" y="335" text-anchor="middle" font-size="54">🍺</text>'}var svg='<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" viewBox="0 0 600 500"><defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#120900"/><stop offset="1" stop-color="#2b1b00"/></linearGradient></defs><rect width="600" height="500" fill="url(#g)"/><circle cx="300" cy="250" r="205" fill="#111" stroke="#ffb000" stroke-width="8" opacity=".95"/>'+body+'<text x="300" y="472" text-anchor="middle" fill="#ffb000" font-family="Arial" font-size="36" font-weight="900">'+label+'</text></svg>';return 'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(svg)}var P=[{cat:'Burgers',tag:'MAIS PEDIDO',name:'Smash da Casa',price:29.90,img:'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=900&q=80',desc:'Blend smash, queijo prato, cebola caramelizada, picles e molho da casa no pão brioche.',type:'burger'},{cat:'Burgers',tag:'NOVO',name:'Bacon Melt',price:34.90,img:'https://images.unsplash.com/photo-1553979459-d2229ba7433b?auto=format&fit=crop&w=900&q=80',desc:'Blend artesanal, cheddar, bacon crocante, maionese defumada e molho barbecue.',type:'burger'},{cat:'Burgers',tag:'DUPLO',name:'Brasa Duplo',price:39.90,img:'https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?auto=format&fit=crop&w=900&q=80',desc:'Dois blends, cheddar, alface, tomate, cebola roxa, picles e molho especial.',type:'burger'},{cat:'Burgers',tag:'CRISPY',name:'Chicken Crispy',price:31.90,img:'https://images.unsplash.com/photo-1606755962773-d324e0a13086?auto=format&fit=crop&w=900&q=80',desc:'Frango crispy, queijo prato, alface, tomate e maionese temperada no pão brioche.',type:'burger'},{cat:'Combos',tag:'COMBO',name:'Combo Smash',price:44.90,img:'https://images.unsplash.com/photo-1572802419224-296b0aeee0d9?auto=format&fit=crop&w=900&q=80',desc:'Smash da casa, fritas crocantes e refrigerante lata.',type:'burger'},{cat:'Combos',tag:'FAMÍLIA',name:'Combo Casal',price:79.90,img:'https://images.unsplash.com/photo-1610614819513-58e34989848b?auto=format&fit=crop&w=900&q=80',desc:'Dois burgers, duas fritas e duas bebidas para compartilhar.',type:'burger'},{cat:'Porções',tag:'PORÇÃO',name:'Fritas',price:18.90,img:'https://images.unsplash.com/photo-1573080496219-bb080dd4f877?auto=format&fit=crop&w=900&q=80',desc:'Porção de fritas crocantes e sequinhas, perfeita para acompanhar seu lanche.',type:'simple'},{cat:'Porções',tag:'PORÇÃO',name:'Onion Rings',price:22.90,img:'https://images.unsplash.com/photo-1639024471283-03518883512d?auto=format&fit=crop&w=900&q=80',desc:'Anéis de cebola empanados, sequinhos e crocantes.',type:'simple'},{cat:'Bebidas',tag:'BEBIDA',name:'Refrigerante',price:7.90,img:icon('can','REFRIGERANTE'),desc:'Opções: Coca-Cola ou Guaraná.',type:'option',options:['Coca-Cola','Guaraná']},{cat:'Bebidas',tag:'BEBIDA',name:'Água com Gás',price:5.90,img:icon('water','ÁGUA COM GÁS'),desc:'Água com gás gelada para acompanhar seu pedido.',type:'simple'},{cat:'Bebidas',tag:'BEBIDA',name:'Cerveja Long Neck',price:12.90,img:icon('beer','LONG NECK'),desc:'Opções: Heineken, Stella ou Budweiser.',type:'option',options:['Heineken','Stella','Budweiser']}];var ADD=[['Adicionar cheddar',3],['Adicionar bacon',4],['Ovo',2],['Fritas',6.9]];var REM=['Sem cebola caramelizada','Sem picles','Sem molho da casa','Sem tomate'];function money(v){return 'R$ '+v.toFixed(2).replace('.',',')}function renderTabs(){tabs.innerHTML=cats.map(function(c){return '<button class="tab '+(c==currentCat?'active':'')+'" onclick="currentCat=\''+c+'\';renderTabs();renderGrid()">'+c+'</button>'}).join('')}function renderGrid(){grid.innerHTML=P.filter(function(p){return p.cat==currentCat}).map(function(p){return '<article class="card"><div class="pic"><img src="'+p.img+'" alt="'+p.name+'"></div><div class="info"><span class="tag">'+p.tag+'</span><h3>'+p.name+'</h3><p class="desc">'+p.desc+'</p><div class="price-row"><b class="price">'+money(p.price)+'</b><button class="add" onclick="openItem(\''+p.name+'\')">Adicionar +</button></div></div></article>'}).join('')}function openItem(n){current=P.find(function(p){return p.name==n});point='Ao ponto';selectedAdds={};selectedRemoves={};selectedOption=current.options?current.options[0]:'';mimg.src=current.img;mtag.textContent=current.tag;mtitle.textContent=current.name;mdesc.textContent=current.desc;mprice.textContent=money(current.price);renderOptions();modalOverlay.classList.add('on')}function renderOptions(){var html='';if(current.type==='burger'){var pts=['Ao ponto','Mal passado','Ponto para mais','Bem passado'];html+='<div class="line"></div><div class="opt-title">1. Escolha o ponto da carne</div><div class="pillbox">'+pts.map(function(p){return '<button class="pill '+(p==point?'active':'')+'" onclick="point=\''+p+'\';renderOptions()">'+p+'</button>'}).join('')+'</div>';html+='<div class="line"></div><div class="opt-title">2. Adicionais</div>'+ADD.map(function(a,i){return '<button class="check '+(selectedAdds[i]?'active':'')+'" onclick="selectedAdds['+i+']=!selectedAdds['+i+'];renderOptions()"><span>'+a[0]+'</span><span class="yellow">+ '+money(a[1])+'</span></button>'}).join('');html+='<div class="line"></div><div class="opt-title">3. Remover ingredientes</div>'+REM.map(function(r,i){return '<button class="check '+(selectedRemoves[i]?'active':'')+'" onclick="selectedRemoves['+i+']=!selectedRemoves['+i+'];renderOptions()"><span>'+r+'</span><span>'+(selectedRemoves[i]?'✓':'')+'</span></button>'}).join('')}else if(current.type==='option'){html+='<div class="line"></div><div class="opt-title">Escolha uma opção</div><div class="pillbox">'+current.options.map(function(o){return '<button class="pill '+(o==selectedOption?'active':'')+'" onclick="selectedOption=\''+o+'\';renderOptions()">'+o+'</button>'}).join('')+'</div>'}else{html+='<div class="line"></div><p class="desc">Clique em adicionar para colocar este item no seu pedido.</p>'}optionArea.innerHTML=html}function closeModal(){modalOverlay.classList.remove('on')}function outsideModal(e){if(e.target==modalOverlay)closeModal()}function addToCart(){var ad=[],rm=[],extra=0,obs='';if(current.type==='burger'){ad=Object.keys(selectedAdds).filter(function(k){return selectedAdds[k]}).map(function(k){return ADD[k]});rm=Object.keys(selectedRemoves).filter(function(k){return selectedRemoves[k]}).map(function(k){return REM[k]});extra=ad.reduce(function(s,a){return s+a[1]},0);obs='Ponto: '+point}else if(current.type==='option'){obs='Opção: '+selectedOption}else{obs=''}cartItems.push({name:current.name,img:current.img,price:current.price+extra,obs:obs,adds:ad,rem:rm,qty:1});closeModal();openCart();toastMsg('Adicionado ao pedido!')}function updateBadge(){var q=cartItems.reduce(function(s,i){return s+i.qty},0);badge.textContent=q;q?badge.classList.add('on'):badge.classList.remove('on')}function openCart(){renderCart();cartDrawer.classList.add('on')}function closeCart(){cartDrawer.classList.remove('on')}function renderCart(){updateBadge();if(!cartItems.length){cartBody.innerHTML='<div class="empty">Seu pedido está vazio.</div>';cartFoot.classList.remove('on');return}cartFoot.classList.add('on');var total=0;cartBody.innerHTML=cartItems.map(function(i,idx){total+=i.price*i.qty;var ad=i.adds&&i.adds.length?'<br>Adic.: '+i.adds.map(function(a){return a[0]}).join(', '):'';var rm=i.rem&&i.rem.length?'<br>Remover: '+i.rem.join(', '):'';var obs=i.obs?i.obs:'';return '<div class="cartitem"><img src="'+i.img+'"><div><b>'+i.name+'</b><small>'+obs+ad+rm+'</small><div class="qty"><button onclick="qty('+idx+',-1)">−</button><span>'+i.qty+'</span><button onclick="qty('+idx+',1)">+</button><button onclick="removeItem('+idx+')">Remover</button></div><b class="yellow">'+money(i.price*i.qty)+'</b></div></div>'}).join('');totalEl.textContent=money(total)}function qty(i,d){cartItems[i].qty+=d;if(cartItems[i].qty<=0)cartItems.splice(i,1);renderCart()}function removeItem(i){cartItems.splice(i,1);renderCart()}function clearCart(){cartItems=[];renderCart();toastMsg('Carrinho esvaziado!')}function continueBuy(){closeCart();window.scrollTo({top:0,behavior:'smooth'})}function finishOrder(){if(!cartItems.length)return;var lines=cartItems.map(function(i,n){var details=[];if(i.obs)details.push(i.obs);if(i.adds&&i.adds.length)details.push('Adicionais: '+i.adds.map(function(a){return a[0]}).join(', '));if(i.rem&&i.rem.length)details.push('Remover: '+i.rem.join(', '));return (n+1)+'. '+i.name+' | Qtd: '+i.qty+(details.length?' | '+details.join(' | '):'')+' | Subtotal: '+money(i.price*i.qty)});var total=cartItems.reduce(function(s,i){return s+i.price*i.qty},0);var msg='Olá! Quero fazer meu pedido na Brasa Burger:%0A%0A'+lines.join('%0A')+'%0A%0ATotal: '+money(total)+'%0A%0AEndereço para entrega/retirada:';window.open('https://wa.me/'+WPP+'?text='+msg,'_blank')}function toastMsg(t){toast.textContent=t;toast.classList.add('on');setTimeout(function(){toast.classList.remove('on')},2200)}var totalEl=document.getElementById('total');renderTabs();renderGrid();updateBadge();</script></body></html>
