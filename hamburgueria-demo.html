<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Brasa Burger - Cardápio Interativo</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,Helvetica,sans-serif;background:#080808;color:#fff}
    .top{position:sticky;top:0;z-index:20;background:#080808e8;backdrop-filter:blur(10px);border-bottom:1px solid #241800}
    .head{display:flex;align-items:center;justify-content:center;padding:16px 90px 16px 16px;position:relative;min-height:82px}
    .logo{text-align:center}.logo h1{font-size:34px;letter-spacing:2px}.logo span{color:#ffb000;font-weight:700;font-size:14px}
    .cartbtn{position:absolute;right:16px;top:50%;transform:translateY(-50%);border:1.5px solid #ffb000;border-radius:999px;background:#111;color:#fff;padding:12px 16px;font-weight:800;cursor:pointer}
    .badge{position:absolute;top:-9px;right:-7px;background:#d71919;width:24px;height:24px;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:12px}.badge.on{display:flex}
    .tabs{display:flex;gap:10px;overflow:auto;padding:12px 16px;background:#101010;border-bottom:1px solid #241800}.tab{border:1px solid #333;background:#151515;color:#fff;border-radius:13px;padding:13px 18px;font-weight:800;white-space:nowrap;cursor:pointer}.tab.active{background:#ffb000;color:#111;border-color:#ffb000}
    .wrap{max-width:1180px;margin:auto;padding:18px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.card{background:#121212;border:1px solid #2b2b2b;border-radius:18px;overflow:hidden}.pic{height:215px;background:#222}.pic img{width:100%;height:100%;object-fit:cover}.info{padding:16px}.tag{display:inline-block;background:#be1e1e;color:#fff;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:800;margin-bottom:8px}.info h3{font-size:22px;margin-bottom:7px}.desc{color:#cfcfcf;font-size:14px;min-height:58px;line-height:1.35}.price-row{display:flex;align-items:center;justify-content:space-between;margin-top:16px}.price{color:#ffb000;font-size:23px;font-weight:900}.add{border:1.5px solid #ffb000;background:transparent;color:#ffb000;border-radius:12px;padding:11px 15px;font-weight:900;cursor:pointer}.add:hover{background:#ffb000;color:#111}
    .benefits{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:22px 0}.benefit{border:1px solid #332300;border-radius:16px;padding:16px;text-align:center;color:#ddd}.benefit b{color:#ffb000;display:block;margin-bottom:5px}
    .overlay{display:none;position:fixed;inset:0;background:#000b;z-index:40;align-items:center;justify-content:center;padding:16px}.overlay.on{display:flex}.modal{width:min(500px,96vw);max-height:92vh;overflow:auto;background:#121212;border:1px solid #333;border-radius:22px;position:relative}.x{position:absolute;top:10px;right:12px;background:none;border:0;color:#fff;font-size:28px;cursor:pointer}.modal img{width:100%;height:260px;object-fit:cover;border-radius:22px 22px 0 0}.modal-body{padding:18px}.modal-body h2{font-size:27px}.line{height:1px;background:#333;margin:16px 0}.opt-title{font-weight:900;margin-bottom:10px}.pillbox{display:grid;grid-template-columns:1fr 1fr;gap:9px}.pill,.check{border:1px solid #444;background:#171717;color:#fff;border-radius:11px;padding:12px;cursor:pointer;text-align:left}.pill.active,.check.active{border-color:#ffb000;background:#2b1b00}.check{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.yellow{color:#ffb000}.modal-add{width:100%;margin-top:16px;background:#ffb000;color:#111;border:0;border-radius:13px;padding:15px;font-size:16px;font-weight:900;cursor:pointer}
    .drawer{position:fixed;right:0;top:0;bottom:0;width:min(410px,100vw);background:#111;z-index:50;transform:translateX(105%);transition:.25s;border-left:1px solid #333;display:flex;flex-direction:column}.drawer.on{transform:translateX(0)}.drawer h2{padding:18px;border-bottom:1px solid #292929}.closecart{position:absolute;right:16px;top:13px;background:0;border:0;color:#fff;font-size:28px;cursor:pointer}.cartbody{padding:14px;overflow:auto;flex:1}.empty{color:#bbb;text-align:center;margin-top:35px}.cartitem{display:flex;gap:12px;padding:12px;border:1px solid #282828;border-radius:14px;margin-bottom:10px}.cartitem img{width:70px;height:70px;border-radius:10px;object-fit:cover}.cartitem b{display:block}.cartitem small{color:#bbb}.qty{display:flex;gap:8px;align-items:center;margin-top:8px}.qty button{background:#222;border:1px solid #444;color:#fff;width:auto;min-width:26px;height:26px;border-radius:7px;cursor:pointer;padding:0 7px}.cartfoot{border-top:1px solid #292929;padding:16px;display:none}.cartfoot.on{display:block}.total{display:flex;justify-content:space-between;font-size:19px;font-weight:900;margin-bottom:12px}.secondary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}.secondary button{padding:12px;border-radius:11px;cursor:pointer;font-weight:800}.clear{background:transparent;color:#ddd;border:1px solid #555}.continue{background:#fff;color:#111;border:1px solid #fff}.finish{width:100%;padding:15px;border-radius:12px;border:0;background:#ffb000;color:#111;font-weight:900;font-size:16px;cursor:pointer}.toast{position:fixed;bottom:24px;left:50%;transform:translate(-50%,80px);background:#ffb000;color:#111;border-radius:12px;padding:13px 20px;font-weight:900;transition:.25s;z-index:80}.toast.on{transform:translate(-50%,0)}
    @media(max-width:800px){.grid{grid-template-columns:1fr 1fr}.benefits{grid-template-columns:1fr 1fr}.logo h1{font-size:24px}.cartbtn{font-size:0;padding:12px}.cartbtn:before{content:'🛒';font-size:20px}.head{padding-right:64px}}
    @media(max-width:520px){.grid{grid-template-columns:1fr}.pic{height:235px}.wrap{padding:12px}.tabs{padding:10px}.tab{padding:11px 14px}.benefits{grid-template-columns:1fr}.logo h1{font-size:21px}.logo span{font-size:12px}}
  </style>
</head>
<body>
  <div class="top">
    <div class="head">
      <div class="logo"><h1>🔥 BRASA BURGER</h1><span>★ Cardápio Interativo ★</span></div>
      <button class="cartbtn" onclick="openCart()">🛒 Ver carrinho <span id="badge" class="badge">0</span></button>
    </div>
    <div class="tabs" id="tabs"></div>
  </div>

  <main class="wrap">
    <div class="grid" id="grid"></div>
    <section class="benefits">
      <div class="benefit"><b>🔥 Carne fresca</b>todos os dias</div>
      <div class="benefit"><b>🍔 Pães artesanais</b>briochados</div>
      <div class="benefit"><b>🏆 Ingredientes</b>selecionados</div>
      <div class="benefit"><b>🛵 Entrega</b>rápida e segura</div>
    </section>
  </main>

  <div id="modalOverlay" class="overlay" onclick="outsideModal(event)">
    <div class="modal">
      <button class="x" onclick="closeModal()">×</button>
      <img id="mimg" alt="Produto">
      <div class="modal-body">
        <span id="mtag" class="tag"></span>
        <h2 id="mtitle"></h2>
        <p id="mdesc" class="desc"></p>
        <div class="price" id="mprice"></div>
        <div class="line"></div>
        <div class="opt-title" id="pointTitle">1. Escolha o ponto da carne</div>
        <div class="pillbox" id="points"></div>
        <div class="line" id="lineAddsTop"></div>
        <div class="opt-title" id="addsTitle">2. Adicionais</div>
        <div id="adds"></div>
        <div class="line"></div>
        <div class="opt-title" id="removesTitle">3. Remover ingredientes</div>
        <div id="removes"></div>
        <button class="modal-add" onclick="addToCart()">🛒 Adicionar ao pedido</button>
      </div>
    </div>
  </div>

  <div id="cart" class="drawer">
    <button class="closecart" onclick="closeCart()">×</button>
    <h2>Meu pedido</h2>
    <div class="cartbody" id="cartBody"></div>
    <div class="cartfoot" id="cartFoot">
      <div class="total"><span>Total</span><span id="total">R$ 0,00</span></div>
      <div class="secondary"><button class="clear" onclick="clearCart()">Esvaziar</button><button class="continue" onclick="continueBuy()">Continuar</button></div>
      <button class="finish" onclick="finishOrder()">Fazer pedido no WhatsApp</button>
    </div>
  </div>

  <div id="toast" class="toast">Adicionado!</div>

  <script>
    var WPP='5516994451494';
    var cats=['Burgers','Combos','Porções','Bebidas'];
    var currentCat='Burgers',current=null,point='Ao ponto',cart=[],selectedAdds={},selectedRemoves={};
    var P=[
      {cat:'Burgers',tag:'MAIS PEDIDO',name:'Smash da Casa',price:29.90,img:'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=900&q=80',desc:'Blend smash, queijo prato, cebola caramelizada, picles e molho da casa no pão brioche.',type:'burger'},
      {cat:'Burgers',tag:'NOVO',name:'Bacon Melt',price:34.90,img:'https://images.unsplash.com/photo-1553979459-d2229ba7433b?auto=format&fit=crop&w=900&q=80',desc:'Blend artesanal, cheddar, bacon crocante, maionese defumada e molho barbecue.',type:'burger'},
      {cat:'Burgers',tag:'DUPLO',name:'Brasa Duplo',price:39.90,img:'https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?auto=format&fit=crop&w=900&q=80',desc:'Dois blends, cheddar, alface, tomate, cebola roxa, picles e molho especial.',type:'burger'},
      {cat:'Burgers',tag:'CRISPY',name:'Chicken Crispy',price:31.90,img:'https://images.unsplash.com/photo-1606755962773-d324e0a13086?auto=format&fit=crop&w=900&q=80',desc:'Frango crispy, queijo prato, alface, tomate e maionese temperada no pão brioche.',type:'burger'},
      {cat:'Combos',tag:'COMBO',name:'Combo Smash',price:44.90,img:'https://images.unsplash.com/photo-1572802419224-296b0aeee0d9?auto=format&fit=crop&w=900&q=80',desc:'Smash da casa, batata rústica crocante e refrigerante lata.',type:'combo'},
      {cat:'Combos',tag:'FAMÍLIA',name:'Combo Casal',price:79.90,img:'https://images.unsplash.com/photo-1610614819513-58e34989848b?auto=format&fit=crop&w=900&q=80',desc:'Dois burgers, duas batatas e duas bebidas para compartilhar.',type:'combo'},
      {cat:'Porções',tag:'PORÇÃO',name:'Batata Rústica',price:18.90,img:'https://images.unsplash.com/photo-1573080496219-bb080dd4f877?auto=format&fit=crop&w=900&q=80',desc:'Batatas rústicas crocantes, douradas e temperadas com páprica, ervas e molho especial.',type:'portion'},
      {cat:'Porções',tag:'PORÇÃO',name:'Onion Rings',price:22.90,img:'https://images.unsplash.com/photo-1639024471283-03518883512d?auto=format&fit=crop&w=900&q=80',desc:'Anéis de cebola empanados, sequinhos e crocantes.',type:'portion'},
      {cat:'Bebidas',tag:'BEBIDA',name:'Refrigerante',price:7.90,img:'https://images.unsplash.com/photo-1622483767028-3f66f32aef97?auto=format&fit=crop&w=900&q=80',desc:'Opções disponíveis: Coca-Cola ou Guaraná.',type:'drink',options:['Coca-Cola','Guaraná']},
      {cat:'Bebidas',tag:'BEBIDA',name:'Água com Gás',price:5.90,img:'https://images.unsplash.com/photo-1564419320461-6870880221ad?auto=format&fit=crop&w=900&q=80',desc:'Água com gás gelada.',type:'drink',options:['Água com Gás']},
      {cat:'Bebidas',tag:'BEBIDA',name:'Cerveja Long Neck',price:12.90,img:'https://images.unsplash.com/photo-1608270586620-248524c67de9?auto=format&fit=crop&w=900&q=80',desc:'Opções disponíveis: Heineken, Stella ou Budweiser.',type:'drink',options:['Heineken','Stella','Budweiser']}
    ];
    var ADD=[['Adicionar cheddar',3],['Adicionar bacon',4],['Ovo',2],['Batata rústica',6.9]];
    var REM=['Sem cebola caramelizada','Sem picles','Sem molho da casa','Sem tomate'];
    var drinkChoice='';
    function money(v){return 'R$ '+v.toFixed(2).replace('.',',')}
    function renderTabs(){tabs.innerHTML=cats.map(c=>'<button class="tab '+(c==currentCat?'active':'')+'" onclick="currentCat=\''+c+'\';renderTabs();renderGrid()">'+c+'</button>').join('')}
    function renderGrid(){grid.innerHTML=P.filter(p=>p.cat==currentCat).map(p=>'<article class="card"><div class="pic"><img src="'+p.img+'" alt="'+p.name+'"></div><div class="info"><span class="tag">'+p.tag+'</span><h3>'+p.name+'</h3><p class="desc">'+p.desc+'</p><div class="price-row"><b class="price">'+money(p.price)+'</b><button class="add" onclick="openItem(\''+p.name+'\')">Adicionar +</button></div></div></article>').join('')}
    function openItem(n){current=P.find(p=>p.name==n);point='Ao ponto';drinkChoice=(current.options&&current.options[0])||'';selectedAdds={};selectedRemoves={};mimg.src=current.img;mtag.textContent=current.tag;mtitle.textContent=current.name;mdesc.textContent=current.desc;mprice.textContent=money(current.price);renderOpts();modalOverlay.classList.add('on')}
    function renderOpts(){
      var isBurger=current.type==='burger'||current.type==='combo';
      var isDrink=current.type==='drink';
      pointTitle.textContent=isDrink?'1. Escolha a opção':(isBurger?'1. Escolha o ponto da carne':'1. Observações');
      var opts=isDrink?current.options:(isBurger?['Ao ponto','Mal passado','Ponto para mais','Bem passado']:['Sem observações']);
      points.innerHTML=opts.map(p=>'<button class="pill '+((isDrink?p==drinkChoice:p==point)?'active':'')+'" onclick="'+(isDrink?'drinkChoice':'point')+'=\''+p+'\';renderOpts()">'+p+'</button>').join('');
      if(isBurger){
        lineAddsTop.style.display='block';addsTitle.style.display='block';adds.style.display='block';removesTitle.style.display='block';removes.style.display='block';
        addsTitle.textContent='2. Adicionais';removesTitle.textContent='3. Remover ingredientes';
        adds.innerHTML=ADD.map((a,i)=>'<button class="check '+(selectedAdds[i]?'active':'')+'" onclick="selectedAdds['+i+']=!selectedAdds['+i+'];renderOpts()"><span>'+a[0]+'</span><span class="yellow">+ '+money(a[1])+'</span></button>').join('');
        removes.innerHTML=REM.map((r,i)=>'<button class="check '+(selectedRemoves[i]?'active':'')+'" onclick="selectedRemoves['+i+']=!selectedRemoves['+i+'];renderOpts()"><span>'+r+'</span><span>'+(selectedRemoves[i]?'✓':'')+'</span></button>').join('');
      }else{
        lineAddsTop.style.display='none';addsTitle.style.display='none';adds.style.display='none';removesTitle.style.display='none';removes.style.display='none';adds.innerHTML='';removes.innerHTML='';
      }
    }
    function closeModal(){modalOverlay.classList.remove('on')}
    function outsideModal(e){if(e.target==modalOverlay)closeModal()}
    function addToCart(){var adds=Object.keys(selectedAdds).filter(k=>selectedAdds[k]).map(k=>ADD[k]);var rem=Object.keys(selectedRemoves).filter(k=>selectedRemoves[k]).map(k=>REM[k]);var extra=adds.reduce((s,a)=>s+a[1],0);cart.push({name:current.name,img:current.img,price:current.price+extra,base:current.price,point:current.type==='drink'?drinkChoice:point,adds:adds,rem:rem,qty:1,type:current.type});closeModal();openCart();toastMsg('Adicionado ao pedido!')}
    function updateBadge(){var q=cart.reduce((s,i)=>s+i.qty,0);badge.textContent=q;q?badge.classList.add('on'):badge.classList.remove('on')}
    function openCart(){renderCart();cart.classList.add('on')}
    function closeCart(){cart.classList.remove('on')}
    function renderCart(){updateBadge();if(!cart.length){cartBody.innerHTML='<div class="empty">Seu pedido está vazio.</div>';cartFoot.classList.remove('on');return}cartFoot.classList.add('on');var total=0;cartBody.innerHTML=cart.map((i,idx)=>{total+=i.price*i.qty;var ad=i.adds.map(a=>a[0]).join(', ')||'sem adicionais';var rm=i.rem.join(', ')||'sem remoções';var detail=i.type==='drink'?'Opção: '+i.point:'Ponto: '+i.point+'<br>Adic.: '+ad+'<br>Remover: '+rm;return '<div class="cartitem"><img src="'+i.img+'"><div><b>'+i.name+'</b><small>'+detail+'</small><div class="qty"><button onclick="qty('+idx+',-1)">−</button><span>'+i.qty+'</span><button onclick="qty('+idx+',1)">+</button><button onclick="removeItem('+idx+')">Remover</button></div><b class="yellow">'+money(i.price*i.qty)+'</b></div></div>'}).join('');totalEl=document.getElementById('total');totalEl.textContent=money(total)}
    function qty(i,d){cart[i].qty+=d;if(cart[i].qty<=0)cart.splice(i,1);renderCart()}
    function removeItem(i){cart.splice(i,1);renderCart()}
    function clearCart(){cart=[];renderCart();toastMsg('Carrinho esvaziado!')}
    function continueBuy(){closeCart();window.scrollTo({top:0,behavior:'smooth'})}
    function finishOrder(){if(!cart.length)return;var lines=cart.map((i,n)=>{var ad=i.adds.map(a=>a[0]).join(', ')||'sem adicionais';var rm=i.rem.join(', ')||'sem remoções';var detail=i.type==='drink'?'Opção: '+i.point:'Ponto: '+i.point+' | Adicionais: '+ad+' | Remover: '+rm;return (n+1)+'. '+i.name+' | Qtd: '+i.qty+' | '+detail+' | Subtotal: '+money(i.price*i.qty)});var total=cart.reduce((s,i)=>s+i.price*i.qty,0);var msg='Olá! Quero fazer meu pedido na Brasa Burger:%0A%0A'+lines.join('%0A')+'%0A%0ATotal: '+money(total)+'%0A%0AEndereço para entrega/retirada:';window.open('https://wa.me/'+WPP+'?text='+msg,'_blank')}
    function toastMsg(t){toast.textContent=t;toast.classList.add('on');setTimeout(()=>toast.classList.remove('on'),2200)}
    renderTabs();renderGrid();
  </script>
</body>
</html>
